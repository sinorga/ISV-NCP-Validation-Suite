# GCP NCP Knowledge File
#
# Human-verified GCP facts for the agent.
# Read-only — the agent MUST use these values instead of guessing.
#
# Last verified: 2026-04-17

ncp: gcp

# ── Compute ────────────────────────────────────────────────────────────

compute:
  gpu_instances:
    - type: n1-standard-4
      gpu: nvidia-tesla-t4
      notes: "Requires guest_accelerators config. Most widely available."
    - type: g2-standard-4
      gpu: nvidia-l4 (integrated)
      notes: "No guest_accelerators needed. Subject to stockouts."
    - type: a2-highgpu-1g
      gpu: nvidia-tesla-a100
      notes: "Only use if T4/L4 unavailable or test requires A100."

  gpu_images:
    # Preferred: custom image built from common-cu129-ubuntu-2204-nvidia-580
    # with CUDA prepended to /etc/environment (non-login PATH) and Docker CE
    # preinstalled. Makes DriverCheck:cuda_toolkit and ContainerRuntimeCheck
    # pass out of the box — no need to exclude them.
    - family: ncp-base-cu129-docker
      project: shoreline-eagle
      notes: "Custom base image. CUDA on PATH for non-login shells + Docker + nvidia-container-toolkit."
    # Stock fallbacks (CUDA only on login PATH, no Docker — require excludes)
    - family: common-cu129-ubuntu-2204-nvidia-580
      project: deeplearning-platform-release
    - family: common-cu128-ubuntu-2204-nvidia-570
      project: deeplearning-platform-release

  fallback_image:
    family: ubuntu-2204-lts
    project: ubuntu-os-cloud

# ── Regions ────────────────────────────────────────────────────────────

regions:
  preferred:
    - asia-east1-a    # Taiwan, nvidia-tesla-t4 available. Close to operator.
    - us-central1-a
    - us-central1-b

# ── Notes ──────────────────────────────────────────────────────────────
# GCP-specific rules for the agent. Read these carefully.

notes:
  - "GCP stopped VMs have status TERMINATED (not STOPPED). Use TERMINATED as the
    target state when polling after a stop operation."

  - "CloudInitCheck defaults metadata_url to AWS 169.254.169.254. GCP uses
    http://metadata.google.internal/computeMetadata/v1/ with required header.
    Override in provider config (vm.yaml) validations:
      cloud_init:
        checks:
          CloudInitCheck:
            metadata_url: 'http://metadata.google.internal/computeMetadata/v1/'
            metadata_headers:
              Metadata-Flavor: 'Google'"

  - "GCP static IP reassociation takes ~12s, exceeding the default 10s floating
    IP switch limit in FloatingIpCheck. The threshold IS configurable — override
    max_switch_seconds to 20 in the network provider config (do NOT exclude the
    whole check, that loses the allocate/associate/reassociate correctness
    subtests):
      validations:
        floating_ip:
          checks:
            FloatingIpCheck:
              max_switch_seconds: 20"

  - "GCP API operations (instance create, subnet create, firewall insert) are
    async and typically take 30-60s each. Steps that create multiple resources
    sequentially (e.g., 4 subnets, 2 instances) need proportionally longer
    timeouts. Use these minimums in provider config step timeouts:
      - API-only steps (CRUD, config checks): 180s
      - Steps creating 1 instance: 300s
      - Steps creating 2+ instances or doing SSH: 600s
      - Steps with instance create + SSH + test + cleanup: 900s
    The isvctl default (120s) is too short for most GCP operations."

  # ── Network domain gotchas (from 2026-04-15 agent run) ──────────────
  # These caused Mode 2 failures that required agent retries. Read carefully.

  - "GCP VPC network `description` is IMMUTABLE after creation. Do NOT use
    networks.patch to update description — it returns 400. To prove mutability
    in vpc_crud tests, use peering or routing mode changes instead."

  - "GCP firewall rules REQUIRE at least one `allowed` entry with `I_p_protocol`
    set. Creating a firewall with `Allowed()` that has no protocol causes 400:
    'Invalid value for field resource.allowed[0]'. Always set I_p_protocol."

  - "GCP Compute API occasionally drops HTTP connections mid-operation
    (RemoteDisconnected error). This is transient (~14% of runs). For
    idempotent operations (describe, list, delete), retry once after a
    2-second delay before failing."

  - "GCP subnets do NOT auto-assign external IPs by default. External IP
    assignment is instance-level (via accessConfig), not subnet-level.
    When reporting auto_assign_public_ip in VPC IP config output, read
    the actual subnet property rather than hardcoding True."

  - "GCP has no per-subnet route tables — routes are VPC-level. Do NOT
    include a route_table_exists subtest in the subnet_config stub output.
    The SubnetConfigCheck validation iterates all keys in the tests dict —
    if route_table_exists is absent, the check passes. If present with
    passed: false, the check fails. Simply omit it."

