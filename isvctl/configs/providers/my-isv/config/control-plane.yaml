# my-isv Control Plane Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic control-plane template and
# wires the commands to the generic template scripts in scripts/control-plane/*.
# Those stubs ship with dummy-success values so this example runs end-to-end
# without any real control-plane API.
#
# Steps:
#   SETUP
#     1. check_api         - API health check
#     2. create_access_key - Create test user + access key
#     3. create_tenant     - Create test tenant
#   TEST
#     4. test_access_key     - Authenticate with the key
#     5. disable_access_key  - Deactivate the key
#     6. verify_key_rejected - Confirm disabled key is rejected
#     7. list_tenants        - Find created tenant in list
#     8. get_tenant          - Retrieve tenant details
#   TEARDOWN
#     9. delete_access_key - Clean up user + key
#    10. delete_tenant     - Clean up tenant
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/control-plane.yaml

import:
  - ../../../suites/control-plane.yaml

version: "1.0"

commands:
  control_plane:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: check_api
        phase: setup
        command: "python ../scripts/control-plane/check_api.py"
        args: ["--region", "{{region}}", "--services", "{{services}}"]
        timeout: 120

      - name: create_access_key
        phase: setup
        command: "python ../scripts/control-plane/create_access_key.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: create_tenant
        phase: setup
        command: "python ../scripts/control-plane/create_tenant.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: test_access_key
        phase: test
        command: "python ../scripts/control-plane/test_access_key.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      - name: disable_access_key
        phase: test
        command: "python ../scripts/control-plane/disable_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: verify_key_rejected
        phase: test
        command: "python ../scripts/control-plane/verify_key_rejected.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      - name: list_tenants
        phase: test
        command: "python ../scripts/control-plane/list_tenants.py"
        args:
          - "--region"
          - "{{region}}"
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
        timeout: 60

      - name: get_tenant
        phase: test
        command: "python ../scripts/control-plane/get_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: delete_access_key
        phase: teardown
        command: "python ../scripts/control-plane/delete_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

      - name: delete_tenant
        phase: teardown
        command: "python ../scripts/control-plane/delete_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

tests:
  cluster_name: "my-isv-control-plane-validation"
  description: "my-isv control plane lifecycle validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    services: "compute,storage,identity"
