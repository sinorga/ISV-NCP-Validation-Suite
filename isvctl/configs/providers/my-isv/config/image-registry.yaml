# my-isv Image Registry Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic image-registry template
# and wires the commands to the generic template stubs in
# scripts/image-registry/*. Those scripts ship with dummy-success values so
# this example runs end-to-end without any real cloud / BMaaS.
#
# Coverage:
#   This example exercises the pure JSON-contract validations
#   (StepSuccessCheck, FieldExistsCheck, CrudOperationsCheck,
#    InstanceStateCheck) on all 7 steps. The vm_ssh validation group
#    (ConnectivityCheck + OsCheck on launch_instance) is excluded via
#    `exclude.markers: [ssh]` because a dummy stub cannot stand up a
#    real VM to SSH into.
#
# ACTION: Remove `exclude.markers: [ssh]` at the bottom once your
#   stubs provision real instances with SSH access.
#
# Note on field names:
#   The BMaaS install steps (install_image_bm, install_config_bm)
#   emit both `state` AND `instance_state`: the canonical
#   FieldExistsCheck requires `instance_state` literally, while
#   InstanceStateCheck reads `state`. `launch_instance` only needs
#   `state` (its FieldExistsCheck does not require `instance_state`).
#   Mirrors the AWS reference (verify_image_installed.py).
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/image-registry.yaml

import:
  - ../../../suites/image-registry.yaml

version: "1.0"

commands:
  image_registry:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: upload_image
        phase: setup
        command: "python ../scripts/image-registry/upload_image.py"
        args:
          - "--image-url"
          - "{{image_url}}"
          - "--image-format"
          - "{{image_format}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: crud_image
        phase: test
        command: "python ../scripts/image-registry/crud_image.py"
        args:
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: launch_instance
        phase: test
        command: "python ../scripts/image-registry/launch_instance.py"
        args:
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: crud_install_config
        phase: test
        command: "python ../scripts/image-registry/crud_install_config.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: install_image_bm
        phase: test
        command: "python ../scripts/image-registry/install_image_bm.py"
        args:
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: install_config_bm
        phase: test
        command: "python ../scripts/image-registry/install_config_bm.py"
        args:
          - "--config-id"
          - "{{steps.crud_install_config.config_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../scripts/image-registry/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--image-id"
          - "{{steps.upload_image.image_id}}"
          - "--disk-ids"
          - "{{steps.upload_image.disk_ids | join(',')}}"
          - "--bucket-name"
          - "{{steps.upload_image.storage_bucket}}"
          - "--key-name"
          - "{{steps.launch_instance.key_name}}"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "--instance-profile"
          - "{{steps.launch_instance.instance_profile}}"
          - "--region"
          - "{{region}}"
          - "{{teardown_flag}}"
        timeout: 60

tests:
  cluster_name: "my-isv-image-registry-validation"
  description: "my-isv image registry lifecycle validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    instance_type: "my-isv.gpu.1x"

  # Skip SSH-based vm_ssh check (ConnectivityCheck + OsCheck on
  # launch_instance) - would try to SSH into the dummy public_ip.
  # Real ISVs remove this exclusion as their stubs come online.
  exclude:
    markers: ["ssh"]
