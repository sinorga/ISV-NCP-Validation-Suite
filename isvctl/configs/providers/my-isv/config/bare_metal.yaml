# my-isv Bare-Metal Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic bare_metal template and
# wires the commands to the generic template scripts in scripts/bare_metal/*.
# Those stubs ship with dummy-success values so this example runs
# end-to-end without any real bare-metal infrastructure.
#
# Coverage:
#   This example exercises only the pure JSON-contract validations
#   (InstanceStateCheck, InstanceListCheck, InstanceTagCheck,
#    TopologyPlacementCheck, SerialConsoleCheck, InstanceStopCheck,
#    InstanceStartCheck, InstanceRebootCheck, InstancePowerCycleCheck,
#    StableIdentifierCheck, StepSuccessCheck). SSH-based host checks
#    (Connectivity, Os, Gpu, Driver, CpuInfo, HostSoftware, GpuStress,
#    Nccl, Training, Nvlink, InfiniBand, Ethernet, ContainerRuntime,
#    CloudInit, NIM*) are excluded via `exclude.markers: [ssh]` because
#    a dummy stub cannot spin up a real host to SSH into. The
#    deploy_nim / teardown_nim / reinstall_instance steps are also
#    skipped for the same reason.
#
# ACTION: Remove `exclude.markers: [ssh]` at the bottom once your
#   stubs provision real instances with SSH access.
#
# Steps:
#   SETUP
#     1. launch_instance      - Provision a bare-metal GPU node
#   TEST
#     2. list_instances       - Find it in the VPC (reuses vm/list_instances)
#     3. verify_tags          - Verify user-defined tags
#     4. topology_placement   - Validate placement-group support
#     5. serial_console       - Confirm serial console access
#     6. stop_instance        - Stop the node
#     7. start_instance       - Start it back up
#     8. reboot_instance      - Reboot it
#     9. power_cycle_instance - Hard power-cycle
#    10. describe_instance    - Re-describe (SSH anchor for host checks)
#    11. reinstall_instance   - SKIPPED (slow; needs real reinstall)
#    12. deploy_nim           - SKIPPED (needs real SSH)
#   TEARDOWN
#    13. teardown_nim         - SKIPPED (needs real SSH)
#    14. teardown             - Terminate the node
#    15. verify_teardown      - Confirm clean tear-down
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/bare_metal.yaml

import:
  - ../../../suites/bare_metal.yaml

version: "1.0"

commands:
  bare_metal:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: launch_instance
        phase: setup
        command: "python ../scripts/bare_metal/launch_instance.py"
        args:
          - "--name"
          - "isv-bm-test-gpu"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: list_instances
        phase: test
        command: "python ../scripts/vm/list_instances.py"
        args:
          - "--vpc-id"
          - "{{steps.launch_instance.vpc_id}}"
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: verify_tags
        phase: test
        command: "python ../scripts/bare_metal/describe_tags.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: topology_placement
        phase: test
        command: "python ../scripts/bare_metal/topology_placement.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: serial_console
        phase: test
        command: "python ../scripts/bare_metal/serial_console.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: stop_instance
        phase: test
        command: "python ../scripts/bare_metal/stop_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      - name: start_instance
        phase: test
        command: "python ../scripts/bare_metal/start_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 60

      - name: reboot_instance
        phase: test
        command: "python ../scripts/bare_metal/reboot_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.start_instance.public_ip}}"
        timeout: 60

      - name: power_cycle_instance
        phase: test
        command: "python ../scripts/bare_metal/power_cycle_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.reboot_instance.public_ip}}"
        timeout: 60

      - name: describe_instance
        phase: test
        command: "python ../scripts/bare_metal/describe_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
        timeout: 60

      - name: reinstall_instance
        phase: test
        skip: true
        command: "python ../scripts/bare_metal/reinstall_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.power_cycle_instance.public_ip}}"
        timeout: 60

      # Skipped: deploy_nim / teardown_nim SSH into a real host to run
      # a NIM container. The dummy stubs can't satisfy them.
      - name: deploy_nim
        phase: test
        skip: true
        command: "python ../../common/deploy_nim.py"
        args:
          - "--host"
          - "{{steps.power_cycle_instance.public_ip}}"
          - "--key-file"
          - "{{steps.power_cycle_instance.key_file}}"
        timeout: 60

      - name: teardown_nim
        phase: teardown
        skip: true
        command: "python ../../common/teardown_nim.py"
        args:
          - "--host"
          - "{{steps.power_cycle_instance.public_ip}}"
          - "--key-file"
          - "{{steps.power_cycle_instance.key_file}}"
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../scripts/bare_metal/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--key-pair-name"
          - "{{steps.launch_instance.key_name}}"
          - "--delete-security-group"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "{{teardown_flag}}"
        timeout: 60

      - name: verify_teardown
        phase: teardown
        command: "python ../scripts/bare_metal/verify_terminated.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "--key-name"
          - "{{steps.launch_instance.key_name}}"
        timeout: 60

tests:
  cluster_name: "my-isv-bm-validation"
  description: "my-isv bare-metal lifecycle validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
    instance_type: "my-isv.bm.gpu.8x"

  # Skip SSH-based host checks (Connectivity, Os, Gpu, Driver, CpuInfo,
  # HostSoftware, GpuStress, Nccl, Training, Nvlink, InfiniBand,
  # Ethernet, ContainerRuntime, CloudInit, NIM*). Real ISVs remove this
  # exclusion as their stubs come online.
  exclude:
    markers: ["ssh"]
