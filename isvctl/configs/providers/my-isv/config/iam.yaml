# my-isv IAM Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic IAM template and wires the
# commands to the generic template scripts in scripts/iam/*. Those scripts ship
# with dummy-success values so this example runs end-to-end out of the box
# without any real IAM platform, proving the stubs + validations contract.
#
# Steps:
#   1. create_user      - scripts/iam/create_user.py      (setup)
#   2. test_credentials - scripts/iam/test_credentials.py (test)
#   3. teardown         - scripts/iam/delete_user.py      (teardown)
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/iam.yaml

import:
  - ../../../suites/iam.yaml

version: "1.0"

commands:
  iam:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: create_user
        phase: setup
        command: "python ../scripts/iam/create_user.py"
        args:
          - "--username"
          - "isv-test-user"
          - "--create-access-key"
        timeout: 60

      - name: test_credentials
        phase: test
        command: "python ../scripts/iam/test_credentials.py"
        args:
          - "--username"
          - "{{steps.create_user.username}}"
          - "--credential-id"
          - "{{steps.create_user.access_key_id}}"
          - "--credential-secret"
          - "{{steps.create_user.secret_access_key}}"
        sensitive_args: ["--credential-secret"]
        timeout: 60

      - name: teardown
        phase: teardown
        command: "python ../scripts/iam/delete_user.py"
        args:
          - "--username"
          - "{{steps.create_user.username}}"
          - "{{teardown_flag}}"
        timeout: 120

tests:
  cluster_name: "my-isv-iam-validation"
  description: "my-isv IAM user lifecycle validation (generic stubs, dummy overrides)"

  settings:
    teardown_flag: "{{(env.IAM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"
