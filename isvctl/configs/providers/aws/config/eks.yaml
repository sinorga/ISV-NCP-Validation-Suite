# AWS EKS Cluster Validation Configuration
# Provisions an EKS GPU cluster using Terraform, then runs the canonical
# Kubernetes validation suite (imported from ../k8s.yaml).
#
# Usage:
#   # Provision cluster and run tests
#   TF_AUTO_APPROVE=true uv run isvctl test run -f isvctl/configs/providers/aws/config/eks.yaml
#
#   # Run tests only (skip setup/teardown)
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/eks.yaml --phase test
#
#   # Skip teardown (preserve resources)
#   AWS_SKIP_TEARDOWN=true TF_AUTO_APPROVE=true uv run isvctl test run -f isvctl/configs/providers/aws/config/eks.yaml
#
# Environment Variables:
#   - TF_AUTO_APPROVE: Set to "true" to skip Terraform approval prompts (default: false)
#   - TF_VAR_*: Terraform variables (e.g., TF_VAR_region, TF_VAR_gpu_node_instance_types)
#   - AWS_SKIP_TEARDOWN: Set to "true" to skip teardown and preserve resources (default: false)
#   - NGC_API_KEY: NGC API key for NIM workloads
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: AWS credentials (if not using IAM roles)

import: ../../../suites/k8s.yaml

version: "1.0"

commands:
  kubernetes:
    steps:
      - name: setup
        phase: setup
        command: "../scripts/eks/setup.sh"
        output_schema: cluster
        timeout: 1800 # 30 min for Terraform provisioning
        env:
          TF_AUTO_APPROVE: "true"
          TF_VAR_region: "us-west-2"
          TF_VAR_gpu_node_instance_types: '["g5.2xlarge"]'
          TF_VAR_gpu_node_desired_size: "1"
          # Override with your IP for security
          TF_VAR_cluster_endpoint_public_access_cidrs: '["0.0.0.0/0"]'

      # Test the Terraform node-pool create path. Runs after the
      # cluster is up; reads cluster state via terraform_remote_state in the
      # node-pool module. See ../scripts/eks/terraform-node-pool/README.md.
      - name: create_test_node_pool
        phase: setup
        command: "../scripts/eks/create_node_pool.sh"
        output_schema: node_pool
        timeout: 900 # 15 min — EKS node group join can take 5-8 min
        env:
          TF_AUTO_APPROVE: "true"
          TF_VAR_test_pool_name: "isv-test-pool"
          TF_VAR_test_pool_instance_types: '["m6i.large"]'
          TF_VAR_test_pool_desired_size: "1"
          TF_VAR_test_pool_labels_json: '{"isv.ncp.validation/workload":"data-ingest"}'
          TF_VAR_test_pool_taints_json: '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
          TF_VAR_test_pool_node_type: "cpu"

      # Scale the same pool to a new target count. Re-applies the
      # terraform-node-pool module with a bumped desired_size; create_node_pool.sh
      # is reused because `terraform apply` is idempotent. The emitted
      # node_pool payload carries the new replica count, which the second
      # K8sNodePoolCheck invocation in the suite asserts on.
      - name: update_test_node_pool
        phase: setup
        command: "../scripts/eks/create_node_pool.sh"
        output_schema: node_pool
        timeout: 900
        env:
          NODE_POOL_ACTION: "Updating"
          TF_AUTO_APPROVE: "true"
          TF_VAR_test_pool_name: "isv-test-pool"
          TF_VAR_test_pool_instance_types: '["m6i.large"]'
          TF_VAR_test_pool_desired_size: "2"
          TF_VAR_test_pool_labels_json: '{"isv.ncp.validation/workload":"data-ingest"}'
          TF_VAR_test_pool_taints_json: '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
          TF_VAR_test_pool_node_type: "cpu"

      # Teardown order: destroy the test node pool before tearing down the
      # cluster so its ENIs/instances are freed before the VPC comes down.
      - name: destroy_test_node_pool
        phase: teardown
        command: "../scripts/eks/destroy_node_pool.sh"
        timeout: 900
        env:
          TF_AUTO_APPROVE: "true"

      - name: teardown
        phase: teardown
        command: "../scripts/eks/teardown.sh"
        timeout: 1800 # 30 min for Terraform destroy
        env:
          TF_AUTO_APPROVE: "true"

tests:
  description: "AWS EKS GPU cluster validation"

  exclude:
    tests:
      - K8sControlPlaneLogsCheck # TODO: need control plane logging
      - K8sNetworkPolicyCheck # TODO: enable ENABLE_NETWORK_POLICY on the VPC CNI addon (or install an enforcing CNI) so NetworkPolicy is enforced on the data plane
      - K8sApiNetworkAclCheck # TODO: EKS is not CAPI-managed and requires an out-of-allow-list vantage point to probe from; skipped until a provider-specific harness exists
