# AWS Bare Metal (BMaaS) Validation Configuration
#
# Imports validations from the provider-agnostic BM canonical config.
# This file only provides AWS-specific commands (boto3 stubs), settings,
# and validation overrides (expected_gpus, image registry checks).
#
# Steps:
#   1. launch_instance - boto3: Provisions bare-metal EC2, outputs IP/key (setup)
#   2. list_instances - boto3: Lists instances in VPC, verifies target exists (test)
#   3. topology_placement - boto3: Validates placement group support (test)
#   4. serial_console - boto3: Retrieves serial console output (test)
#   5. verify_image - boto3: Verifies OS image installed on BM instance (test)
#   6. verify_config - boto3: Verifies install config can provision BM (test)
#   7. stop_instance - boto3: Powers off BM node, verifies stopped state (test)
#   8. start_instance - boto3: Powers on BM node, verifies recovery (test)
#   9. reboot_instance - boto3: Reboots instance, validates recovery (test)
#  10. power_cycle_instance - boto3: Hard power off + on, validates cold-start (test)
#  11. describe_instance - boto3: Describes current state, passes SSH info (test)
#                          (runs after power_cycle so IP is current)
#  12. reinstall_instance - boto3: Reinstalls OS from stock AMI (test) [skip: true]
#  13. deploy_nim - paramiko: Deploys NIM container via SSH (test)
#  14. teardown_nim - paramiko: Stops NIM container via SSH (teardown)
#  15. teardown - boto3: Terminates bare-metal EC2 (teardown)
#  16. verify_teardown - boto3: Confirms instance terminated (teardown)
#
# Dev workflow (reuse existing instance):
#   # Run 1: launch + test, keep instance alive
#   AWS_BM_SKIP_TEARDOWN=true uv run isvctl test run -f isvctl/configs/providers/aws/config/bare_metal.yaml
#
#   # Run 2+: reuse instance, iterate on tests
#   AWS_BM_INSTANCE_ID=i-xxx AWS_BM_KEY_FILE=/tmp/isv-bm-test-key.pem \
#     AWS_BM_SKIP_TEARDOWN=true uv run isvctl test run -f isvctl/configs/providers/aws/config/bare_metal.yaml
#
#   # Final: teardown
#   AWS_BM_INSTANCE_ID=i-xxx AWS_BM_KEY_FILE=/tmp/isv-bm-test-key.pem \
#     uv run isvctl test run -f isvctl/configs/providers/aws/config/bare_metal.yaml
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/bare_metal.yaml

import:
  - ../../../suites/bare_metal.yaml

version: "1.0"

commands:
  bare_metal:
    phases: ["setup", "test", "teardown"]
    steps:
      # Launch bare-metal GPU instance (boto3)
      # Set AWS_BM_INSTANCE_ID + AWS_BM_KEY_FILE to reuse an existing instance
      - name: launch_instance
        phase: setup
        command: "python3 ../scripts/bare_metal/launch_instance.py"
        args:
          - "--name"
          - "isv-bm-test-gpu"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 1200

      # List instances in VPC - verifies instance is visible
      # Reuses VM script (generic EC2 API)
      - name: list_instances
        phase: test
        command: "python3 ../scripts/vm/list_instances.py"
        args:
          - "--vpc-id"
          - "{{steps.launch_instance.vpc_id}}"
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 120

      # Verify user-defined tags on BM instance (boto3)
      # Reuses the VM describe_tags pattern (generic EC2 API)
      - name: verify_tags
        phase: test
        command: "python3 ../scripts/bare_metal/describe_tags.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # Topology-based placement validation (boto3)
      - name: topology_placement
        phase: test
        command: "python3 ../scripts/bare_metal/topology_placement.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 120

      # Serial console output (boto3)
      - name: serial_console
        phase: test
        command: "python3 ../scripts/bare_metal/serial_console.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # Verify OS image installed on BM instance
      - name: verify_image
        phase: test
        command: "python3 ../scripts/image-registry/verify_image_installed.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # Verify install config can provision BM
      - name: verify_config
        phase: test
        command: "python3 ../scripts/image-registry/verify_config_installable.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 120

      # Stop BM node and verify powered-off state (boto3)
      # BM-specific: longer waiter timeout for full hardware power-down
      - name: stop_instance
        phase: test
        command: "python3 ../scripts/bare_metal/stop_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 1800

      # Start stopped BM node and verify recovery (boto3)
      # BM-specific: longer waiter timeout for POST/BIOS/OS boot cycle
      - name: start_instance
        phase: test
        command: "python3 ../scripts/bare_metal/start_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 2700

      # Reboot instance and validate recovery
      # BM-specific: longer waits for hardware POST/BIOS/OS boot
      - name: reboot_instance
        phase: test
        command: "python3 ../scripts/bare_metal/reboot_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.start_instance.public_ip}}"
        timeout: 1800

      # Power-cycle: hard power off + power on (cold start)
      # Force=True bypasses OS shutdown - equivalent to pulling the power
      - name: power_cycle_instance
        phase: test
        command: "python3 ../scripts/bare_metal/power_cycle_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.reboot_instance.public_ip}}"
        timeout: 3600

      # Describe instance state - SSH/GPU validation anchor
      # Runs after power_cycle so the IP is current (stop/start may reassign it)
      - name: describe_instance
        phase: test
        command: "python3 ../scripts/bare_metal/describe_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
        timeout: 120

      # Reinstall instance from stock OS (stop + swap root volume + start)
      # Skipped by default: ~30-45 min on AWS metal, and CreateReplaceRootVolumeTask
      # is not supported. The script performs a manual root volume swap instead.
      # Set skip: false to enable on platforms where reinstall is fast/supported.
      - name: reinstall_instance
        phase: test
        skip: true
        command: "python3 ../scripts/bare_metal/reinstall_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.power_cycle_instance.public_ip}}"
        timeout: 3600

      # Deploy NIM container via SSH (shared script)
      # Requires NGC_API_KEY env var
      # Uses post-power-cycle IP/key since power-cycle may reassign the public IP
      - name: deploy_nim
        phase: test
        command: "python3 ../../common/deploy_nim.py"
        args:
          - "--host"
          - "{{steps.power_cycle_instance.public_ip}}"
          - "--key-file"
          - "{{steps.power_cycle_instance.key_file}}"
        timeout: 1800

      # Teardown NIM container via SSH (shared script)
      # Uses post-power-cycle IP/key to match what deploy_nim used
      - name: teardown_nim
        phase: teardown
        command: "python3 ../../common/teardown_nim.py"
        args:
          - "--host"
          - "{{steps.power_cycle_instance.public_ip}}"
          - "--key-file"
          - "{{steps.power_cycle_instance.key_file}}"
        timeout: 120

      # Teardown bare-metal instance (boto3)
      # Set AWS_BM_SKIP_TEARDOWN=true to keep the instance alive
      - name: teardown
        phase: teardown
        command: "python3 ../scripts/bare_metal/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
          - "{{teardown_flag}}"
        timeout: 2400

      # Post-teardown sanitization: verify instance terminated and resources deleted
      - name: verify_teardown
        phase: teardown
        command: "python3 ../scripts/bare_metal/verify_terminated.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "--key-name"
          - "{{steps.launch_instance.key_name}}"
        timeout: 120

tests:
  cluster_name: "aws-bm-validation"
  description: "AWS Bare Metal (BMaaS) validation tests"

  settings:
    region: "us-west-2"
    instance_type: "g4dn.metal"
    teardown_flag: "{{(env.AWS_BM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # Overrides only - all other validations inherited from ../bare_metal.yaml
  validations:
    # GPU stress - AWS metal has 8 GPUs
    gpu_stress:
      step: describe_instance
      checks:
        GpuStressCheck:
          runtime: 30
          memory_gb: 16
          expected_gpus: 8

    # NCCL - AWS metal has 8 GPUs
    nccl:
      step: describe_instance
      checks:
        NcclCheck:
          expected_gpus: 8

    # Training - AWS metal has 8 GPUs
    training:
      step: describe_instance
      checks:
        TrainingCheck:
          steps: 50
          expected_gpus: 8

    # Start GPU - AWS metal has 8 GPUs
    start_gpu:
      step: start_instance
      checks:
        GpuCheck:
          expected_gpus: 8

    # Power-cycle GPU - AWS metal has 8 GPUs
    power_cycle_gpu:
      step: power_cycle_instance
      checks:
        GpuCheck:
          expected_gpus: 8

    # NVLink - AWS metal has 8 GPUs
    nvlink:
      step: describe_instance
      checks:
        NvlinkCheck:
          expected_gpus: 8

    # AWS-specific: verify OS image installed on BM instance
    image_installed:
      step: verify_image
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["instance_id", "image_id", "image_name", "instance_state"]
        InstanceStateCheck:
          expected_state: "running"

    # AWS-specific: verify install config can provision BM
    config_installable:
      step: verify_config
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["config_id", "config_name", "dry_run_passed"]
