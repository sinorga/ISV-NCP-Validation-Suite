# Minikube Cluster Validation Configuration
# Imports the canonical K8s test suite and adds bare-metal host checks
# for local development and single-node testing.
#
# Usage:
#   isvctl test run -f isvctl/configs/providers/minikube.yaml
#   isvctl test run -f isvctl/configs/providers/minikube.yaml -- -v -s

import: ../suites/k8s.yaml

version: "1.0"

commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "my-isv/scripts/k8s/setup_minikube.sh"
        timeout: 60
      - name: teardown
        phase: teardown
        command: "my-isv/scripts/k8s/teardown_minikube.sh"
        timeout: 30

tests:
  description: "Minikube local validation"

  settings:
    show_skipped_tests: true

  validations:
    # Host-level GPU checks (not in k8s.yaml)
    bare_metal:
      checks:
        BmDriverVersion:
          min_version: "580.0"
        BmCudaVersion:
          min_version: "12.0"
        BmGpuDetection:
          expected_count: "{{ steps.setup.kubernetes.gpu_per_node | default(1, true) }}"
        BmGpuHealth: {}
        BmGpuComputeCapability:
          expected_compute_capability: "8.0"

    # Override K8s defaults for single-node
    kubernetes:
      checks:
        K8sNodeCountCheck:
          count: "{{ steps.setup.kubernetes.node_count | default(1, true) }}"
        K8sGpuPodAccessCheck:
          total_gpu_count: "{{ steps.setup.kubernetes.gpu_node_count | default(1, true) }}"
        K8sGpuCapacityCheck:
          expected_per_node: "{{ steps.setup.kubernetes.gpu_per_node | default(1, true) }}"
          expected_total: "{{ steps.setup.kubernetes.total_gpus | default(1, true) }}"
        K8sDriverVersionCheck:
          driver_version: "{{ steps.setup.kubernetes.driver_version }}"
        K8sGpuOperatorNamespaceCheck:
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sGpuOperatorPodsCheck:
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sMigConfigCheck:
          require_mig: false
          expected_labels:
            "nvidia.com/mig.capable": "false"
            "nvidia.com/mig.strategy": "single"

    # Minikube has no real network ACL on its API; this exercises the
    # check's probe logic end-to-end. The unauthorized probe targets a
    # non-routable RFC 5737 address and will time out — proving the
    # check correctly interprets a failing probe as "ACL enforced".
    # Not a substitute for a real provider harness.
    k8s_network:
      checks:
        K8sApiNetworkAclCheck:
          cluster_name: "{{ steps.setup.cluster_name | default('minikube', true) }}"
          require_endpoint_info: false
          authorized_probe_cmd: "kubectl get --raw /healthz"
          unauthorized_probe_cmd: "curl --max-time 3 -fsS https://192.0.2.1:6443/healthz"
          probe_timeout: 10

    # ReFrame checks (not in k8s.yaml)
    reframe:
      checks:
        CPUInfoCheck: {}
        GpuMemoryCheck: {}

  exclude:
    markers:
      - slow
      - workload
      - reframe
    tests:
      - K8sControlPlaneLogsCheck # TODO: need control plane logging
