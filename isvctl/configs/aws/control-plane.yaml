# AWS Control Plane Validation Configuration
# Tests cloud control plane API health, access key lifecycle, and tenant management.
#
# Tests:
# - API Health: Authentication and service connectivity
# - Access Key Lifecycle: Create, authenticate, disable, verify rejection, delete
# - Tenant Lifecycle: Create, list, get info, delete
#
# Architecture:
#   - Scripts: Platform-specific (boto3) - CRUD operations
#   - Validations: Platform-agnostic - defined in tests.validations
#
# Validation timing is inferred from step's phase.
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/aws/control-plane.yaml
#
# Required IAM Permissions:
#   sts:GetCallerIdentity, iam:ListUsers, ec2:DescribeRegions, s3:ListBuckets,
#   iam:CreateUser, iam:DeleteUser, iam:CreateAccessKey, iam:DeleteAccessKey, iam:UpdateAccessKey,
#   resource-groups:CreateGroup, resource-groups:DeleteGroup, resource-groups:ListGroups, resource-groups:GetGroup

version: "1.0"

commands:
  control_plane:
    phases: ["setup", "test", "teardown"]
    steps:
      # =======================================================================
      # SETUP: API Health Check
      # =======================================================================
      - name: check_api
        phase: setup
        command: "python3 ../stubs/aws/control-plane/check_api.py"
        args: ["--region", "{{region}}", "--services", "{{services}}"]
        timeout: 120

      # =======================================================================
      # SETUP: Create Resources
      # =======================================================================
      - name: create_access_key
        phase: setup
        command: "python3 ../stubs/aws/control-plane/create_access_key.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: create_tenant
        phase: setup
        command: "python3 ../stubs/aws/control-plane/create_tenant.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      # =======================================================================
      # TEST: Access Key Lifecycle
      # =======================================================================
      - name: test_access_key
        phase: test
        command: "python3 ../stubs/aws/control-plane/test_access_key.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      - name: disable_access_key
        phase: test
        command: "python3 ../stubs/aws/control-plane/disable_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
        timeout: 60

      - name: verify_key_rejected
        phase: test
        command: "python3 ../stubs/aws/control-plane/verify_key_rejected.py"
        args:
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
          - "--secret-access-key"
          - "{{steps.create_access_key.secret_access_key}}"
          - "--region"
          - "{{region}}"
          - "--wait"
          - "5"
          - "--retries"
          - "5"
        sensitive_args: ["--secret-access-key"]
        timeout: 120

      # =======================================================================
      # TEST: Tenant Lifecycle
      # =======================================================================
      - name: list_tenants
        phase: test
        command: "python3 ../stubs/aws/control-plane/list_tenants.py"
        args:
          - "--region"
          - "{{region}}"
          - "--target-group"
          - "{{steps.create_tenant.tenant_name}}"
        timeout: 60

      - name: get_tenant
        phase: test
        command: "python3 ../stubs/aws/control-plane/get_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # =======================================================================
      # TEARDOWN: Cleanup Resources
      # =======================================================================
      - name: delete_access_key
        phase: teardown
        command: "python3 ../stubs/aws/control-plane/delete_access_key.py"
        args:
          - "--username"
          - "{{steps.create_access_key.username}}"
          - "--access-key-id"
          - "{{steps.create_access_key.access_key_id}}"
        timeout: 60
        output_schema: teardown

      - name: delete_tenant
        phase: teardown
        command: "python3 ../stubs/aws/control-plane/delete_tenant.py"
        args:
          - "--group-name"
          - "{{steps.create_tenant.tenant_name}}"
          - "--region"
          - "{{region}}"
        timeout: 60
        output_schema: teardown

tests:
  platform: control_plane
  cluster_name: "aws-control-plane-validation"
  description: "AWS control plane: API health, access key lifecycle, tenant lifecycle"

  settings:
    region: "us-west-2"
    services: "ec2,s3,iam,sts"

  # Validations - timing inferred from step's phase
  validations:
    api_health:
      step: check_api
      checks:
        - FieldExistsCheck:
            fields: ["account_id", "tests"]
        - FieldValueCheck:
            field: "success"
            expected: true

    setup_checks:
      checks:
        - AccessKeyCreatedCheck:
            step: create_access_key
        - TenantCreatedCheck:
            step: create_tenant

    access_key_lifecycle:
      checks:
        - AccessKeyAuthenticatedCheck:
            step: test_access_key
        - AccessKeyDisabledCheck:
            step: disable_access_key
        - AccessKeyRejectedCheck:
            step: verify_key_rejected

    tenant_lifecycle:
      checks:
        - TenantListedCheck:
            step: list_tenants
        - TenantInfoCheck:
            step: get_tenant

    teardown_checks:
      checks:
        - StepSuccessCheck:
            step: delete_access_key
        - StepSuccessCheck:
            step: delete_tenant

  exclude:
    markers: []
