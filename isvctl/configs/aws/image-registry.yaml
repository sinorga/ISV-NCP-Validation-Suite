# AWS ISO/VMDK Import Validation Configuration
#
# Architecture:
#   - Scripts: Provider-specific (boto3 for AWS) - handle cloud operations
#   - Validations: Provider-agnostic - defined in tests.validations
#   - Schema: Uses generic field names (image_id, storage_bucket, disk_ids)
#             with provider-specific aliases for backward compatibility
#
# Steps:
#   1. upload_image - Downloads VMDK, uploads to storage, imports as image
#   2. launch_instance - Creates GPU instance from imported image
#   3. teardown - Cleans up all resources (instance, image, storage, etc.)
#
# Validation timing is inferred from step's phase.
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/aws/image-registry.yaml
#
#   # Skip specific steps
#   uv run isvctl test run -f isvctl/configs/aws/image-registry.yaml --set commands.image_registry.steps[0].skip=true
#
# Environment Variables:
#   - AWS_REGION: AWS region (default: us-west-2)
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN: AWS credentials
#   - AWS_ISO_SKIP_TEARDOWN: Set to "true" to skip teardown (for debugging)
#
# Required IAM Permissions:
#   ec2:ImportImage, ec2:DescribeImportImageTasks, ec2:CancelImportTask,
#   ec2:RunInstances, ec2:TerminateInstances, ec2:DescribeImages,
#   ec2:DeregisterImage, ec2:DeleteSnapshot, ec2:DescribeInstances,
#   s3:CreateBucket, s3:DeleteBucket, s3:PutObject, s3:DeleteObject, s3:ListBucket,
#   iam:CreateRole, iam:DeleteRole, iam:PutRolePolicy, iam:DeleteRolePolicy,
#   iam:GetRole, iam:CreateInstanceProfile, iam:DeleteInstanceProfile,
#   iam:AddRoleToInstanceProfile, iam:RemoveRoleFromInstanceProfile

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
commands:
  image_registry:
    phases: ["setup", "test", "teardown"]
    steps:
      # Step 1: Upload VMDK and import as AMI (long-running: 15-60 min)
      - name: upload_image
        phase: setup
        command: "python3 ../stubs/aws/image-registry/upload_image.py"
        args:
          - "--image-url"
          - "{{image_url}}"
          - "--image-format"
          - "{{image_format}}"
          - "--region"
          - "{{region}}"
        timeout: 3600 # 60 minutes for import

      # Step 2: Launch GPU instance from imported image
      - name: launch_instance
        phase: test
        command: "python3 ../stubs/aws/image-registry/launch_instance.py"
        args:
          - "--ami-id"
          - "{{steps.upload_image.image_id}}" # Use generic field name
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 600 # 10 minutes

      # Step 3: CRUD OS install config (EC2 Launch Template lifecycle)
      - name: crud_install_config
        phase: test
        command: "python3 ../stubs/aws/image-registry/crud_install_config.py"
        args:
          - "--region"
          - "{{region}}"
        timeout: 120

      # Step 4: Cleanup all resources
      - name: teardown
        phase: teardown
        command: "python3 ../stubs/aws/image-registry/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--ami-id"
          - "{{steps.upload_image.image_id}}" # Use generic field name
          - "--snapshot-ids"
          - "{{steps.upload_image.disk_ids | join(',')}}" # Use generic field name
          - "--bucket-name"
          - "{{steps.upload_image.storage_bucket}}" # Use generic field name
          - "--key-name"
          - "{{steps.launch_instance.key_name}}"
          - "--security-group-id"
          - "{{steps.launch_instance.security_group_id}}"
          - "--instance-profile"
          - "{{steps.launch_instance.instance_profile}}"
          - "--region"
          - "{{region}}"
          - "{{teardown_flag}}"
        timeout: 1800 # Covers full cleanup: instance termination (300s) + AMI/snapshot deletion + S3 cleanup + SG retries (50s) + IAM cleanup

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "aws-image-registry-validation"
  description: "AWS VM Import ISO/VMDK validation tests"
  platform: image_registry

  settings:
    region: "us-west-2"
    image_url: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.vmdk"
    image_format: "vmdk"
    instance_type: "g4dn.xlarge"
    teardown_flag: "{{(env.AWS_ISO_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # Validations - timing inferred from step's phase
  validations:
    # Validate image import succeeded (using generic field names)
    iso_import:
      step: upload_image
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["image_id", "storage_bucket", "disk_ids"]
        - FieldValueCheck:
            field: "success"
            expected: true

    # Validate instance launch succeeded
    instance_launch:
      step: launch_instance
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["instance_id", "public_ip", "key_path"]
        - InstanceStateCheck:
            expected_state: "running"

    # Validate SSH connectivity to instance
    ssh:
      step: launch_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "ubuntu"

    # Validate GPU is working
    # FIXME: Must be validated before certification
    # gpu:
    #   step: launch_instance
    #   checks:
    #     - SshGpuCheck:
    #         expected_gpus: 1

    # TODO: Add GPU stress test
    # gpu_workload:
    #   step: launch_instance
    #   checks:
    #     - SshGpuStressCheck:
    #         duration: 60

    # Validate install config CRUD
    install_config_crud:
      step: crud_install_config
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["config_id", "config_name", "operations"]

    # Validate teardown succeeded
    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
