# IAM User Lifecycle Validation - Template Configuration
#
# This is a PROVIDER-AGNOSTIC template for testing user account
# create -> verify -> delete lifecycle. Copy this file and the
# accompanying stubs/ scripts, then replace the script implementations
# with your platform's API calls.
#
# Architecture:
#   - Scripts: Platform-specific (YOU implement these) - do all IAM work
#   - Validations: Platform-agnostic (provided) - just check JSON output
#
# Contract:
#   Each script MUST print a JSON object to stdout. The validations
#   only inspect that JSON. As long as your scripts output the right
#   fields, the validations pass regardless of which IAM system you use.
#
# Steps:
#   1. create_user  (setup)    - Create a user account, output JSON
#   2. test_credentials (test) - Verify the credentials work, output JSON
#   3. teardown     (teardown) - Delete the user, output JSON
#
# Quick start:
#   1. Copy this folder:  cp -r templates/ my-isv/
#   2. Edit the stubs:    my-isv/stubs/iam/create_user.py (etc.)
#   3. Run:               uv run isvctl test run -f isvctl/configs/my-isv/iam.yaml
#
# See also:
#   - AWS reference implementation: ../aws-iam.yaml + ../stubs/aws/iam/
#   - JSON schemas: isvctl/src/isvctl/config/output_schemas.py

version: "1.0"

commands:
  iam:
    phases: ["setup", "test", "teardown"]
    steps:
      # ─── Step 1: Create User ───────────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "iam",
      #     "username": "<created-username>",
      #     "user_id": "<unique-id>",
      #     "access_key_id": "<credential-id>",       # if applicable
      #     "secret_access_key": "<credential-secret>" # if applicable
      #   }
      - name: create_user
        phase: setup
        command: "python ./stubs/iam/create_user.py"
        args:
          - "--username"
          - "isv-test-user"
        timeout: 60

      # ─── Step 2: Test Credentials ──────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "iam",
      #     "account_id": "<account-or-tenant-id>",
      #     "tests": {
      #       "identity": {"passed": true},
      #       "access":   {"passed": true}
      #     }
      #   }
      #
      # The args below use Jinja2 templating to forward values from
      # the create_user step output. Adjust arg names to match your script.
      - name: test_credentials
        phase: test
        command: "python ./stubs/iam/test_credentials.py"
        args:
          - "--username"
          - "{{steps.create_user.username}}"
          - "--credential-id"
          - "{{steps.create_user.access_key_id}}"
          - "--credential-secret"
          - "{{steps.create_user.secret_access_key}}"
        sensitive_args: ["--credential-secret"]
        timeout: 60

      # ─── Step 3: Teardown (Delete User) ────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "iam",
      #     "resources_deleted": ["user:<username>"],
      #     "message": "User deleted successfully"
      #   }
      - name: teardown
        phase: teardown
        command: "python ./stubs/iam/delete_user.py"
        args:
          - "--username"
          - "{{steps.create_user.username}}"
          - "{{teardown_flag}}"
        timeout: 120

tests:
  cluster_name: "iam-validation"
  description: "IAM user lifecycle validation (template)"
  platform: iam

  settings:
    # Override these for your environment
    region: "us-west-2"
    teardown_flag: "{{(env.IAM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  # You should NOT need to change these unless you add extra checks.
  validations:
    setup_checks:
      step: create_user
      checks:
        - FieldExistsCheck:
            fields: ["username", "access_key_id"]
        - StepSuccessCheck: {}

    credentials:
      step: test_credentials
      checks:
        - FieldExistsCheck:
            field: "account_id"
        - StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
