# MicroK8s Cluster Validation Configuration
# For local development and single-node testing
# K8S_PROVIDER is auto-detected (microk8s vs kubectl)
#
# Usage:
#   isvctl test run -f isvctl/configs/microk8s.yaml
#   isvctl test run -f isvctl/configs/microk8s.yaml -- -v -s

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "./stubs/microk8s/setup.sh"
        timeout: 60
      - name: teardown
        phase: teardown
        command: "./stubs/microk8s/teardown.sh"
        timeout: 30

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{steps.setup.cluster_name}}"
  description: "MicroK8s local validation"
  platform: kubernetes

  settings:
    show_skipped_tests: true

  validations:
    bare_metal:
      checks:
        - BmDriverVersion:
            min_version: "580.0"
        - BmCudaVersion:
            min_version: "12.0"
        - BmGpuDetection:
            expected_count: "{{ steps.setup.kubernetes.gpu_per_node | default(1, true) }}"
        - BmGpuHealth: {}
        - BmGpuComputeCapability:
            expected_compute_capability: "8.0"

    kubernetes:
      checks:
        - K8sNodeCountCheck:
            count: "{{ steps.setup.kubernetes.node_count | default(1, true) }}"
        - K8sNodeReadyCheck:
            require_all_ready: true
        - K8sNvidiaSmiCheck:
            runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        - K8sDriverVersionCheck:
            driver_version: "{{ steps.setup.kubernetes.driver_version | default('580.126.09') }}"
            runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        - K8sGpuPodAccessCheck:
            # Note: This check runs nvidia-smi in a pod that requests 1 GPU,
            # so it can only verify 1 GPU is visible per node (K8s isolation).
            # Use gpu_node_count here (not total_gpus) since each pod only sees its allocated GPU.
            gpu_count: 1
            total_gpu_count: "{{ steps.setup.kubernetes.gpu_node_count | default(1, true) }}"
            runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        - K8sGpuCapacityCheck:
            # This queries node capacity directly - shows real GPU count
            resource_name: "{{ steps.setup.kubernetes.gpu_resource_name | default('nvidia.com/gpu') }}"
            expected_per_node: "{{ steps.setup.kubernetes.gpu_per_node | default(1, true) }}"
            expected_total: "{{ steps.setup.kubernetes.total_gpus | default(1, true) }}"
        - K8sGpuOperatorNamespaceCheck:
            namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('gpu-operator-resources') }}"
        - K8sGpuOperatorPodsCheck:
            namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('gpu-operator-resources') }}"
        - K8sGpuLabelsCheck:
            label_selector: "nvidia.com/gpu.present=true"
        - K8sPodHealthCheck:
            ignore_phases: ["Pending"]
        - K8sNoPendingPodsCheck: {}
        - K8sNoErrorPodsCheck:
            error_states: ["Error", "CrashLoopBackOff"]
        - K8sMigConfigCheck:
            require_mig: false
            expected_labels:
              "nvidia.com/mig.capable": "false"
              "nvidia.com/mig.strategy": "single"

    k8s_workloads:
      checks:
        - K8sNcclWorkload: {}
        - K8sGpuStressWorkload:
            memory_gb: 1
            runtime: 30
        - K8sNimInferenceWorkload:
            timeout: 900
        - K8sNimHelmWorkload-1b:
            model: "meta/llama-3.2-1b-instruct"
            model_tag: "latest"
            gpu_count: 1
            timeout: 900
            genai_perf_requests: 100
            genai_perf_concurrency: 4
        - K8sNimHelmWorkload-3b:
            model: "meta/llama-3.2-3b-instruct"
            model_tag: "latest"
            gpu_count: "{{ steps.setup.kubernetes.total_gpus | default(4, true) }}"
            timeout: 1800
            genai_perf_requests: 200
            genai_perf_concurrency: 8

    reframe:
      checks:
        - CPUInfoCheck: {}
        - GpuMemoryCheck: {}

  exclude:
    markers:
      - slow
      - workload
      - reframe
