# AWS EKS Cluster Validation Configuration
# Provisions an EKS GPU cluster using Terraform and runs Kubernetes validation tests.
#
# This config uses Shell + Terraform (legacy mode) as an example of the alternative approach.
# Compare with aws-vm.yaml which uses Python scripts with step-based execution.
#
# Usage:
#   # Provision cluster and run tests
#   TF_AUTO_APPROVE=true uv run isvctl test run -f isvctl/configs/aws-eks.yaml
#
#   # Run tests only (skip setup/teardown)
#   uv run isvctl test run -f isvctl/configs/aws-eks.yaml --phase test
#
#   # Teardown cluster
#   AWS_TEARDOWN_ENABLED=true TF_AUTO_APPROVE=true uv run isvctl test run -f isvctl/configs/aws-eks.yaml --phase teardown
#
# Environment Variables:
#   - TF_AUTO_APPROVE: Set to "true" to skip Terraform approval prompts (default: false)
#   - TF_VAR_*: Terraform variables (e.g., TF_VAR_region, TF_VAR_gpu_node_instance_types)
#   - AWS_TEARDOWN_ENABLED: Set to "true" to enable teardown (default: false)
#   - NGC_NIM_API_KEY: NGC API key for NIM workloads
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: AWS credentials (if not using IAM roles)

version: "1.0"

# =============================================================================
# Lifecycle Commands (Shell + Terraform)
# =============================================================================
# Shell scripts that wrap Terraform and output JSON inventory
commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: provision_cluster
        phase: setup
        command: "./stubs/aws/eks/setup.sh"
        timeout: 1800 # 30 min for Terraform provisioning
        env:
          TF_AUTO_APPROVE: "true"
          TF_VAR_region: "us-west-2"
          TF_VAR_gpu_node_instance_types: '["g5.xlarge"]'
          TF_VAR_gpu_node_desired_size: "1"
          # Override with your IP for security
          TF_VAR_cluster_endpoint_public_access_cidrs: '["0.0.0.0/0"]'

      - name: teardown_cluster
        phase: teardown
        command: "./stubs/aws/eks/teardown.sh"
        timeout: 1800 # 30 min for Terraform destroy
        env:
          AWS_TEARDOWN_ENABLED: "false"
          TF_AUTO_APPROVE: "true"

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{inventory.cluster_name}}"
  description: "AWS EKS GPU cluster validation"
  platform: kubernetes

  settings:
    show_skipped_tests: false

  validations:
    kubernetes:
      # Note: Values come from setup.sh output via inventory.kubernetes.*
      # Defaults match typical single-GPU-node EKS setup (2 system + 1 GPU = 3 nodes)
      - K8sNodeCountCheck:
          count: "3"
      - K8sNodeReadyCheck:
          require_all_ready: true
      - K8sNvidiaSmiCheck:
          runtime_class: "nvidia"
      - K8sDriverVersionCheck:
          driver_version: "570.195.03"
          runtime_class: "nvidia"
      - K8sGpuPodAccessCheck:
          gpu_count: 1
          total_gpu_count: 1
          runtime_class: "nvidia"
      - K8sGpuCapacityCheck:
          resource_name: "nvidia.com/gpu"
          expected_per_node: 1
          expected_total: 1
      - K8sGpuOperatorNamespaceCheck:
          namespace: "gpu-operator"
      - K8sGpuOperatorPodsCheck:
          namespace: "gpu-operator"
      - K8sGpuLabelsCheck:
          label_selector: "nvidia.com/gpu.present=true"
      - K8sPodHealthCheck:
          ignore_phases: ["Pending"]
      - K8sNoPendingPodsCheck: {}
      - K8sNoErrorPodsCheck:
          error_states: ["Error", "CrashLoopBackOff"]

    k8s_workloads:
      - K8sNcclWorkload: {}
      - K8sGpuStressWorkload:
          memory_gb: 1
          runtime: 30
      - K8sNimInferenceWorkload:
          timeout: 900
      - K8sNimHelmWorkload-1b:
          model: "meta/llama-3.2-1b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 900
          genai_perf_requests: 100
          genai_perf_concurrency: 4
      - K8sNimHelmWorkload-3b:
          model: "meta/llama-3.2-3b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 1800
          genai_perf_requests: 200
          genai_perf_concurrency: 8

  exclude:
    markers: []
