# Bare Metal Configuration Overrides
#
# Usage:
#   isvctl deploy run <host> -f isvctl/configs/bare_metal.yaml -f isvctl/configs/bare_metal-overrides.yaml
#
# This file is merged on top of the base config (isvctl/configs/bare_metal.yaml).
# Uncomment and modify sections you need to customize.

# Override the setup/teardown commands
# commands:
#   bare_metal:
#     setup:
#       command: "./my-setup.sh"       # Executable path or name
#       args:                          # Arguments passed to command
#         - "--gpu-check"
#       timeout: 300                   # Max execution time (seconds)
#       env:                           # Additional environment variables
#         MY_VAR: "value"
#     teardown:
#       command: "echo"                # Example: simple echo command
#       args:
#         - "Teardown complete"
#       # Or skip teardown entirely:
#       # skip: true

# Override inventory values (for testing without running setup)
# context:
#   inventory:
#     bare_metal:
#       gpu_count: 4
#       driver_version: "580.82.07"
#       cuda_version: "12.8"

# Exclude specific tests
# tests:
#   exclude:
#     markers:
#       - slow
#     tests:
#       - BmDriverInstalled
