# VM (Virtual Machine) Validation - Canonical Configuration
#
# THE canonical VM test suite. Provider configs import this file and
# override commands with platform-specific stubs.
#
# Architecture:
#   - Scripts: Platform-specific (YOU implement these) - do all VM work
#   - Validations: Platform-agnostic (provided) - just check JSON output
#
# Contract:
#   Each script MUST print a JSON object to stdout. The validations
#   only inspect that JSON. As long as your scripts output the right
#   fields, the validations pass regardless of which cloud you use.
#
# Steps:
#   1. launch_instance  (setup)    - Provision GPU VM, output IP/key
#   2. list_instances   (test)     - List instances, verify target exists
#   3. verify_tags      (test)     - Verify user-defined tags on instance
#   4. stop_instance    (test)     - Stop VM, verify stopped state
#   5. start_instance   (test)     - Start stopped VM, verify recovery
#   6. reboot_instance  (test)     - Reboot VM, validate recovery
#   7. deploy_nim       (test)     - Deploy NIM container via SSH
#   8. teardown_nim     (teardown) - Stop NIM container via SSH
#   9. teardown         (teardown) - Terminate VM and cleanup
#
# Quick start (new provider):
#   1. Create your provider folder: mkdir -p isvctl/configs/providers/my-isv/
#   2. Create providers/my-isv/vm.yaml with: import: ../../tests/vm.yaml
#   3. Override commands with your platform stubs
#   4. Run: uv run isvctl test run -f isvctl/configs/providers/my-isv/vm.yaml
#
# See also:
#   - AWS reference implementation: ../aws/vm.yaml + ../stubs/aws/vm/
#   - JSON schemas: isvctl/src/isvctl/config/output_schemas.py

version: "1.0"

commands:
  vm:
    phases: ["setup", "test", "teardown"]
    steps:
      # ─── Step 1: Launch Instance ───────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "<unique-id>",
      #     "public_ip": "<ip-address>",
      #     "key_file": "<path-to-ssh-key>",
      #     "vpc_id": "<network-id>",
      #     "instance_state": "running",
      #     "security_group_id": "<sg-id>",
      #     "key_name": "<key-pair-name>"
      #   }
      - name: launch_instance
        phase: setup
        command: "python3 ../stubs/vm/launch_instance.py"
        args:
          - "--name"
          - "isv-test-gpu"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 600

      # ─── Step 2: List Instances ────────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instances": [{"instance_id": "...", "state": "running"}],
      #     "total_count": 1
      #   }
      - name: list_instances
        phase: test
        command: "python3 ../stubs/vm/list_instances.py"
        args:
          - "--vpc-id"
          - "{{steps.launch_instance.vpc_id}}"
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 120

      # ─── Step 3: Verify Tags ──────────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "<id>",
      #     "tags": {"Name": "...", ...},
      #     "tag_count": <int>
      #   }
      - name: verify_tags
        phase: test
        command: "python3 ../stubs/vm/describe_tags.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # ─── Step 4: Stop Instance ────────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "...",
      #     "state": "stopped",
      #     "stop_initiated": true
      #   }
      - name: stop_instance
        phase: test
        command: "python3 ../stubs/vm/stop_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 600

      # ─── Step 5: Start Instance ───────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "...",
      #     "state": "running",
      #     "public_ip": "...",
      #     "key_file": "...",
      #     "start_initiated": true,
      #     "ssh_ready": true
      #   }
      - name: start_instance
        phase: test
        command: "python3 ../stubs/vm/start_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 300

      # ─── Step 6: Reboot Instance ──────────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "...",
      #     "instance_state": "running",
      #     "public_ip": "...",
      #     "key_file": "...",
      #     "uptime_seconds": <int>,
      #     "ssh_connectivity": true
      #   }
      - name: reboot_instance
        phase: test
        command: "python3 ../stubs/vm/reboot_instance.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--public-ip"
          - "{{steps.launch_instance.public_ip}}"
        timeout: 600

      # ─── Step 7: Serial Console Access ──────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "instance_id": "<id>",
      #     "console_available": true,
      #     "serial_access_enabled": true,
      #     "output_length": 4096
      #   }
      - name: serial_console
        phase: test
        command: "python3 ../stubs/vm/serial_console.py"
        args:
          - "--instance-id"
          # instance_id is stable across reboots; no need to use post-reboot step output
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
        timeout: 60

      # ─── Step 8: Deploy NIM Container ─────────────────────────────
      # Uses post-reboot IP/key since reboot may reassign the public IP.
      # See stubs/common/deploy_nim.py for the JSON contract.
      - name: deploy_nim
        phase: test
        command: "python3 ../stubs/common/deploy_nim.py"
        args:
          - "--host"
          - "{{steps.reboot_instance.public_ip}}"
          - "--key-file"
          - "{{steps.reboot_instance.key_file}}"
        timeout: 1800

      # ─── Step 9: Teardown NIM ─────────────────────────────────────
      # Uses post-reboot IP/key to match what deploy_nim used.
      - name: teardown_nim
        phase: teardown
        command: "python3 ../stubs/common/teardown_nim.py"
        args:
          - "--host"
          - "{{steps.reboot_instance.public_ip}}"
          - "--key-file"
          - "{{steps.reboot_instance.key_file}}"
        timeout: 120

      # ─── Step 10: Teardown Instance ───────────────────────────────
      # YOUR SCRIPT must output JSON with at minimum:
      #   {
      #     "success": true,
      #     "platform": "vm",
      #     "resources_deleted": [...],
      #     "message": "..."
      #   }
      - name: teardown
        phase: teardown
        command: "python3 ../stubs/vm/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
          - "{{teardown_flag}}"
        timeout: 600

tests:
  platform: vm
  cluster_name: "vm-validation"
  description: "VM (virtual machine) GPU validation tests"

  settings:
    region: "us-west-2"
    instance_type: "g5.xlarge"
    teardown_flag: "{{(env.VM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: launch_instance
      checks:
        InstanceStateCheck:
          expected_state: "running"

    instance_created:
      step: launch_instance
      checks:
        InstanceCreatedCheck: {}

    list_instances:
      step: list_instances
      checks:
        InstanceListCheck:
          min_count: 1

    ssh:
      step: launch_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    gpu:
      step: launch_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    host_os:
      step: launch_instance
      checks:
        VcpuPinningCheck: {}
        PciBusCheck:
          expected_gpus: 1
        HostSoftwareCheck: {}

    tags:
      step: verify_tags
      checks:
        InstanceTagCheck:
          required_keys: ["Name", "CreatedBy"]

    cloud_init:
      step: launch_instance
      checks:
        CloudInitCheck: {}

    stop_checks:
      step: stop_instance
      checks:
        InstanceStopCheck: {}

    start_checks:
      step: start_instance
      checks:
        InstanceStartCheck: {}

    start_ssh:
      step: start_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    start_gpu:
      step: start_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    reboot_checks:
      step: reboot_instance
      checks:
        InstanceRebootCheck:
          max_uptime: 600

    reboot_state:
      step: reboot_instance
      checks:
        InstanceStateCheck:
          expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    reboot_gpu:
      step: reboot_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    reboot_host_os:
      step: reboot_instance
      checks:
        VcpuPinningCheck: {}
        PciBusCheck:
          expected_gpus: 1
        HostSoftwareCheck: {}

    serial_console:
      step: serial_console
      checks:
        SerialConsoleCheck: {}

    nim_health:
      step: deploy_nim
      checks:
        NimHealthCheck: {}

    nim_models:
      step: deploy_nim
      checks:
        NimModelCheck: {}

    nim_inference:
      step: deploy_nim
      checks:
        NimInferenceCheck:
          prompt: "What is CUDA?"
          max_tokens: 50

    driver_info:
      step: launch_instance
      checks:
        DriverCheck: {}

    cpu_info:
      step: launch_instance
      checks:
        CpuInfoCheck: {}

    container_runtime:
      step: launch_instance
      checks:
        ContainerRuntimeCheck: {}

    nim_teardown:
      step: teardown_nim
      checks:
        StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck: {}

  exclude:
    markers: []
