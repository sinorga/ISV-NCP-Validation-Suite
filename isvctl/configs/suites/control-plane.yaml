# Control Plane Validation - Canonical Contract
#
# Validations-only contract for control plane. Provider configs import
# this file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/control-plane.yaml to providers/<your-platform>/config/control-plane.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/control-plane.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/control-plane.yaml
#   - AWS reference: providers/aws/config/control-plane.yaml + providers/aws/scripts/control-plane/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: control_plane
  cluster_name: "control-plane-validation"
  description: "Control plane: API health, access key lifecycle, tenant lifecycle"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    services: ""

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    api_health:
      step: check_api
      checks:
        FieldExistsCheck:
          fields: ["account_id", "tests"]
        FieldValueCheck:
          field: "success"
          expected: true

    setup_checks:
      checks:
        AccessKeyCreatedCheck:
          step: create_access_key
        TenantCreatedCheck:
          step: create_tenant

    access_key_lifecycle:
      checks:
        AccessKeyAuthenticatedCheck:
          step: test_access_key
        AccessKeyDisabledCheck:
          step: disable_access_key
        AccessKeyRejectedCheck:
          step: verify_key_rejected

    tenant_lifecycle:
      checks:
        TenantListedCheck:
          step: list_tenants
        TenantInfoCheck:
          step: get_tenant

    teardown_checks:
      checks:
        StepSuccessCheck-delete_access_key:
          step: delete_access_key
        StepSuccessCheck-delete_tenant:
          step: delete_tenant

  exclude:
    markers: []
