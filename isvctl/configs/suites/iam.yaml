# IAM User Lifecycle Validation - Canonical Contract
#
# Validations-only contract for IAM. Provider configs import this file
# and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which IAM system you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/iam.yaml to providers/<your-platform>/config/iam.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/iam.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/iam.yaml
#   - AWS reference: providers/aws/config/iam.yaml + providers/aws/scripts/iam/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  cluster_name: "iam-validation"
  description: "IAM user lifecycle validation"
  platform: iam

  settings:
    # Provider-specific - override in your provider config
    region: ""
    teardown_flag: "{{(env.IAM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  # You should NOT need to change these unless you add extra checks.
  validations:
    setup_checks:
      step: create_user
      checks:
        FieldExistsCheck:
          fields: ["username", "access_key_id"]
        StepSuccessCheck: {}

    credentials:
      step: test_credentials
      checks:
        FieldExistsCheck:
          field: "account_id"
        StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck: {}

  exclude:
    markers: []
