# Kubernetes Cluster Validation Configuration
# This unified config contains all settings for validating a K8s cluster
# K8S_PROVIDER is auto-detected (microk8s vs kubectl).
# To use OpenShift `oc` or another kubectl-compatible CLI, set KUBECTL
# in the environment or under `env` for commands.
#
# Usage:
#   isvctl test run -f isvctl/configs/suites/k8s.yaml
#   isvctl test run -f isvctl/configs/suites/k8s.yaml --phase test  # Skip setup/teardown
#   isvctl test run -f isvctl/configs/suites/k8s.yaml -- -v -s -k "K8sNodeCountCheck"

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
# Stubs that query the cluster and return inventory JSON
commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "../providers/my-isv/scripts/k8s/setup.sh"
        timeout: 120
      - name: teardown
        phase: teardown
        command: "../providers/my-isv/scripts/k8s/teardown.sh"
        timeout: 30

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{steps.setup.cluster_name}}"
  description: "Kubernetes cluster validation"
  platform: kubernetes

  settings:
    show_skipped_tests: false

  validations:
    kubernetes:
      checks:
        K8sNodeCountCheck:
          count: "{{ steps.setup.kubernetes.node_count | default(4, true) }}"
        K8sExpectedNodesCheck:
          names: []
        K8sNodeReadyCheck:
          require_all_ready: true
        K8sNvidiaSmiCheck:
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sDriverVersionCheck:
          driver_version: "{{ steps.setup.kubernetes.driver_version | default('580.82.07') }}"
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sGpuPodAccessCheck:
          # Note: This check runs nvidia-smi in a pod that requests 1 GPU,
          # so it can only verify 1 GPU is visible per node (K8s isolation).
          # Use gpu_node_count here (not total_gpus) since each pod only sees its allocated GPU.
          gpu_count: 1
          total_gpu_count: "{{ steps.setup.kubernetes.gpu_node_count | default(4, true) }}"
          runtime_class: "{{ steps.setup.kubernetes.runtime_class | default('nvidia') }}"
        K8sGpuCapacityCheck:
          # This queries node capacity directly - shows real GPU count
          resource_name: "{{ steps.setup.kubernetes.gpu_resource_name | default('nvidia.com/gpu') }}"
          expected_per_node: "{{ steps.setup.kubernetes.gpu_per_node | default(4, true) }}"
          expected_total: "{{ steps.setup.kubernetes.total_gpus | default(16, true) }}"
        K8sGpuOperatorNamespaceCheck:
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sGpuOperatorPodsCheck:
          namespace: "{{ steps.setup.kubernetes.gpu_operator_namespace | default('nvidia-gpu-operator') }}"
        K8sGpuLabelsCheck:
          label_selector: "nvidia.com/gpu.present=true"
        K8sPodHealthCheck:
          ignore_phases: ["Pending"]
        K8sNoPendingPodsCheck: {}
        K8sNoErrorPodsCheck:
          error_states: ["Error", "CrashLoopBackOff"]
        K8sMigConfigCheck:
          require_mig: false
          expected_labels:
            "nvidia.com/mig.capable": "true"
            "nvidia.com/mig.strategy": "single"
        K8sDualStackNodeCheck:
          require_dual_stack: "auto" # true | false | "auto"
        K8sNetworkPolicyCheck:
          image: "registry.k8s.io/e2e-test-images/agnhost:2.47"
          probe_port: 8080
          probe_timeout_s: 10
          settle_timeout_s: 30
          namespace_prefix: "isvtest-netpol"
          test_egress: true

    k8s_identity:
      checks:
        K8sOidcIssuerCheck: {}

    k8s_conformance:
      checks:
        K8sCncfConformanceCheck:
          # For valid `mode` values, see
          # docs/guides/configuration.md#kubernetes-conformance-modes
          mode: "quick"
          timeout: 7200
          startup_timeout: 600
          cleanup_namespace: true
          report_individual_tests: false

    k8s_workloads:
      checks:
        K8sNcclWorkload:
          min_bus_bw_gbps: 100
          timeout: 600
        K8sNcclMultiNodeWorkload:
          nodes: "{{ steps.setup.kubernetes.gpu_node_count | default(2, true) }}"
          min_bus_bw_gbps: 100
          quick_mode: false
          timeout: 600
          use_compute_domain: auto
        K8sGpuStressWorkload:
          memory_gb: 1
          runtime: 30
          timeout: 300
        K8sNimInferenceWorkload:
          timeout: 1500
        K8sNimHelmWorkload-1b:
          model: "meta/llama-3.2-1b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 900
          genai_perf_requests: 100
          genai_perf_concurrency: 4
        K8sNimHelmWorkload-3b:
          model: "meta/llama-3.2-3b-instruct"
          model_tag: "latest"
          gpu_count: "{{ steps.setup.kubernetes.gpu_per_node | default(4, true) }}"
          timeout: 1800
          genai_perf_requests: 200
          genai_perf_concurrency: 8

    # Provider-agnostic node-pool CRUD outcome checks. Each
    # provisioning step (EKS: terraform; CAPI: kubectl apply) emits a
    # `node_pool` JSON payload that seeds the expected shape below; labels,
    # taints, and instance types come across as JSON strings so Jinja
    # string rendering doesn't mangle the structure, and K8sNodePoolCheck
    # json-parses them. The check is listed twice — once per operation —
    # so list form is required (dict form would collide on the class name).
    k8s_node_pools:
      - K8sNodePoolCheck:
          # Create: pool reaches desired replica count.
          label_selector: "{{ steps.create_test_node_pool.label_selector }}"
          expected_replicas: "{{ steps.create_test_node_pool.expected_replicas | default(1, true) }}"
          expected_labels: "{{ steps.create_test_node_pool.expected_labels_json | default('{}', true) }}"
          expected_taints: "{{ steps.create_test_node_pool.expected_taints_json | default('[]', true) }}"
          expected_instance_types: "{{ steps.create_test_node_pool.expected_instance_types_json | default('[]', true) }}"
          node_type: "{{ steps.create_test_node_pool.node_type | default('cpu') }}"
          wait_timeout: 900
          poll_interval: 10
      - K8sNodePoolCheck:
          # Update (scale): same pool converges to the new count.
          label_selector: "{{ steps.update_test_node_pool.label_selector }}"
          expected_replicas: "{{ steps.update_test_node_pool.expected_replicas | default(2, true) }}"
          expected_labels: "{{ steps.update_test_node_pool.expected_labels_json | default('{}', true) }}"
          expected_taints: "{{ steps.update_test_node_pool.expected_taints_json | default('[]', true) }}"
          expected_instance_types: "{{ steps.update_test_node_pool.expected_instance_types_json | default('[]', true) }}"
          node_type: "{{ steps.update_test_node_pool.node_type | default('cpu') }}"
          wait_timeout: 900
          poll_interval: 10

    k8s_observability:
      checks:
        K8sApiServerMetricsCheck: {}
        K8sControlPlaneLogsCheck:
          # mode=auto resolves each component independently: kubectl when a
          # control-plane pod exists in `namespace`, else `commands[component]`.
          # This covers hybrid clusters (some components as static pods, others
          # managed externally). Managed-provider examples:
          #   commands:
          #     kube-apiserver: >-
          #       aws logs tail /aws/eks/my-cluster/cluster
          #       --log-stream-name-prefix kube-apiserver- --since 5m
          #     kube-scheduler: >-
          #       gcloud logging read
          #       'resource.type=k8s_cluster AND logName:kube-scheduler'
          #       --limit 20 --freshness 5m
          #     kube-controller-manager: >-
          #       az monitor log-analytics query -w $LAW_ID --analytics-query
          #       "KubeEvents | where ObjectKind == 'kube-controller-manager'
          #       | take 20"
          # `namespace` is only used by the kubectl path; `since` is forwarded
          # to `kubectl logs --since` and ignored in command mode.
          mode: auto
          components:
            - kube-apiserver
            - kube-scheduler
            - kube-controller-manager
          min_log_lines: 1
          namespace: "{{ steps.setup.kubernetes.control_plane_namespace | default('kube-system') }}"
          tail: 20

    k8s_network:
      checks:
        K8sApiNetworkAclCheck:
          # Probe-based, provider-agnostic: verifies the API endpoint
          # refuses connections from a source that should be blocked. The
          # operator supplies two shell commands:
          #   - authorized_probe_cmd: a command expected to SUCCEED (e.g.
          #     a kubectl call from an allow-listed admin host). Serves as
          #     a baseline — without it, a failing unauthorized probe is
          #     ambiguous (ACL works vs. API is down).
          #   - unauthorized_probe_cmd: a command expected to FAIL or time
          #     out (e.g. curling the endpoint via SSH on an external host
          #     that is not in the allow-list).
          # The check reads `Cluster.spec.controlPlaneEndpoint` from the
          # management cluster to surface endpoint metadata in the result;
          # set `require_endpoint_info: false` to skip that read.
          cluster_name: "{{ steps.setup.kubernetes.capi_cluster_name }}"
          namespace: "{{ steps.setup.kubernetes.capi_cluster_namespace | default('default') }}"
          authorized_probe_cmd: "{{ steps.setup.kubernetes.authorized_probe_cmd }}"
          unauthorized_probe_cmd: "{{ steps.setup.kubernetes.unauthorized_probe_cmd }}"
          probe_timeout: 10
          require_endpoint_info: true

  exclude:
    markers: []
