# Kubernetes Configuration Overrides
#
# Usage:
#   isvctl deploy run <host> -f isvctl/configs/k8s.yaml -f isvctl/configs/k8s-overrides.yaml
#
# This file is merged on top of the base config (isvctl/configs/k8s.yaml).
# Uncomment and modify sections you need to customize.

# Override the setup/teardown commands
# commands:
#   kubernetes:
#     setup:
#       command: "./my-setup.sh"         # Executable path or name
#       args:                            # Arguments passed to command
#         - "--kubeconfig"
#         - "/path/to/kubeconfig"
#       timeout: 300                     # Max execution time (seconds)
#       env:                             # Additional environment variables
#         MY_VAR: "value"
#     teardown:
#       command: "echo"                  # Simple command example
#       args:
#         - "Teardown complete"
#       # Or skip teardown entirely:
#       # skip: true

# Exclude specific tests
# tests:
#   exclude:
#     markers:
#       - slow
#     tests:
#       - K8sNodeCountCheck
