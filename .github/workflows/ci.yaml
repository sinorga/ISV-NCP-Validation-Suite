name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: linux-amd64-cpu4
    container:
      image: ghcr.io/nvidia/dsx-cds-tools:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit
        run: make pre-commit

  test:
    name: Unit Tests
    runs-on: linux-amd64-cpu4
    needs: pre-commit
    container:
      image: ghcr.io/nvidia/dsx-cds-tools:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: make test

  # ============================================================================
  # SECURITY STAGE
  # ============================================================================

  security-secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for secret scanning

      - name: Run TruffleHog Scan
        uses: NVIDIA/dsx-github-actions/.github/actions/trufflehog-scan@9a9ce3a7770a8b53d2726afa920be3276bc3ddd7
        with:
          extra-args: "--results=verified,unknown --only-verified"
          post-pr-comment: "true"
          fail-on-findings: "true"

  security-codeql-scan:
    name: Security Analysis (CodeQL)
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run CodeQL Scan
        uses: NVIDIA/dsx-github-actions/.github/actions/codeql-scan@55d1e0af17fb4431edaca19fbd5c78fecd29d18a
        with:
          languages: python
          build-mode: none
          category: /language:python
          upload-sarif: "false" # Disable upload until GHAS is enabled, such as the repo be public
          post-pr-comment: "false"
          fail-on-findings: "true" # Enforce quality gate
          fail-on-severity: "error" # Only fail on critical/high severity issues

  security-trivy-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      pull-requests: write
    env:
      TRIVY_IGNOREFILE: .trivyignore.yaml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy Scan
        uses: NVIDIA/dsx-github-actions/.github/actions/trivy-scan@495fc76167e3d265f817c1fdc00b7b9275436418
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          scanners: vuln,secret,misconfig,license
          severity: HIGH,CRITICAL
          skip-dirs: .git,dist,htmlcov,.pytest_cache,.ruff_cache,.venv,node_modules,vendor,.terraform
          ignore-unfixed: "true"
          upload-sarif: "false" # Needs GitHub Advanced Security; enable when allowed + add security-events: write
          post-pr-comment: "true"
          compare-base-ref: main
          fail-on-findings: "true"

      - name: Trivy finding details (job summary)
        if: always()
        run: make security-trivy-detail

  # ============================================================================
  # PIPELINE STATUS
  # ============================================================================

  # Gate job: aggregates all job results into a single required status check.
  # Note: When adding new jobs above, append them to the 'needs' list below.
  pipeline-status:
    name: Pipeline Status
    runs-on: linux-amd64-cpu4
    if: always()
    needs:
      - pre-commit
      - test
      - security-secret-scan
      - security-codeql-scan
      - security-trivy-scan
    steps:
      - name: Check Pipeline Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs on the pipeline failed! Check the logs for details."
            exit 1
          fi
