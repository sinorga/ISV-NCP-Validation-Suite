name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: linux-amd64-cpu4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit
        run: make pre-commit
